<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .display-section {
            grid-column: 1 / -1;
        }

        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .item-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .item-card p {
            color: #666;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .item-card .price {
            color: #28a745;
            font-weight: bold;
            font-size: 16px;
        }

        .item-card .stock {
            color: #ff9800;
            font-weight: bold;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-delete, .btn-edit {
            flex: 1;
            padding: 8px;
            font-size: 13px;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-edit:hover {
            background: #e0a800;
        }

        .message {
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .sections {
                grid-template-columns: 1fr;
            }

            .items-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 E-Commerce Admin Panel</h1>

        <div class="sections">
            <!-- Categories Section -->
            <div class="section">
                <h2>📁 Categories</h2>
                <div id="categoryMessage" class="message"></div>
                
                <form id="categoryForm">
                    <div class="form-group">
                        <label for="catName">Category Name</label>
                        <input type="text" id="catName" placeholder="Enter category name" required>
                    </div>
                    <button type="submit">Add Category</button>
                </form>

                <div id="categoriesList" class="items-container">
                    <div class="loading">Loading categories...</div>
                </div>
            </div>

            <!-- Products Section -->
            <div class="section">
                <h2>📦 Products</h2>
                <div id="productMessage" class="message"></div>

                <form id="productForm">
                    <div class="form-group">
                        <label for="productCat">Category</label>
                        <select id="productCat" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="productName">Product Name</label>
                        <input type="text" id="productName" placeholder="Enter product name" required>
                    </div>
                    <div class="form-group">
                        <label for="productImage">Image URL</label>
                        <input type="url" id="productImage" placeholder="Enter image URL" required>
                    </div>
                    <div class="form-group">
                        <label for="productDesc">Description</label>
                        <textarea id="productDesc" placeholder="Enter product description" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Price</label>
                        <input type="number" id="productPrice" placeholder="Enter price" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="productStock">Stock</label>
                        <input type="number" id="productStock" placeholder="Enter stock quantity" min="0" required>
                    </div>
                    <button type="submit">Add Product</button>
                </form>
            </div>

            <!-- Display Section -->
            <div class="section display-section">
                <h2>📋 All Products</h2>
                <div id="productsList" class="items-container">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000";

        // Load categories
        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                
                const categoriesList = document.getElementById("categoriesList");
                const productCatSelect = document.getElementById("productCat");
                
                categoriesList.innerHTML = "";
                productCatSelect.innerHTML = '<option value="">Select a category</option>';
                
                if (!Array.isArray(data)) {
                    categoriesList.innerHTML = '<p>No categories found</p>';
                    return;
                }

                data.forEach(cat => {
                    // Add to categories list
                    const catCard = document.createElement("div");
                    catCard.className = "item-card";
                    catCard.innerHTML = `
                        <h3>${cat.name}</h3>
                        <p><small>${cat._id}</small></p>
                        <div class="item-actions">
                            <button class="btn-delete" onclick="deleteCategory('${cat._id}')">Delete</button>
                        </div>
                    `;
                    categoriesList.appendChild(catCard);

                    // Add to product select
                    const option = document.createElement("option");
                    option.value = cat._id;
                    option.textContent = cat.name;
                    productCatSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading categories:", error);
                showMessage("categoryMessage", "Error loading categories", "error");
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                
                const productsList = document.getElementById("productsList");
                productsList.innerHTML = "";
                
                if (!Array.isArray(data)) {
                    productsList.innerHTML = '<p>No products found</p>';
                    return;
                }

                data.forEach(product => {
                    const productCard = document.createElement("div");
                    productCard.className = "item-card";
                    productCard.innerHTML = `
                        <h3>${product.name}</h3>
                        <img src="${product.image}" style="width: 100%; height: 220px; object-fit: contain; background: #f0f0f0; border-radius: 5px; margin-bottom: 10px; padding: 5px;">
                        <p>${product.description}</p>
                        <p class="price">$${product.price.toFixed(2)}</p>
                        <p class="stock">Stock: ${product.stock}</p>
                        <p><small>ID: ${product._id}</small></p>
                        <div class="item-actions">
                            <button class="btn-delete" onclick="deleteProduct('${product._id}')">Delete</button>
                        </div>
                    `;
                    productsList.appendChild(productCard);
                });
            } catch (error) {
                console.error("Error loading products:", error);
                showMessage("productMessage", "Error loading products", "error");
            }
        }

        // Add category
        document.getElementById("categoryForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("catName").value.trim();
            
            try {
                const response = await fetch(`${API_URL}/categories`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });
                
                if (response.ok) {
                    showMessage("categoryMessage", "Category added successfully!", "success");
                    document.getElementById("categoryForm").reset();
                    loadCategories();
                } else {
                    showMessage("categoryMessage", "Error adding category", "error");
                }
            } catch (error) {
                console.error("Error:", error);
                showMessage("categoryMessage", "Error adding category", "error");
            }
        });

        // Add product
        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const product = {
                cat_id: document.getElementById("productCat").value,
                name: document.getElementById("productName").value.trim(),
                image: document.getElementById("productImage").value.trim(),
                description: document.getElementById("productDesc").value.trim(),
                price: parseFloat(document.getElementById("productPrice").value),
                stock: parseInt(document.getElementById("productStock").value)
            };
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(product)
                });
                
                if (response.ok) {
                    showMessage("productMessage", "Product added successfully!", "success");
                    document.getElementById("productForm").reset();
                    loadProducts();
                } else {
                    showMessage("productMessage", "Error adding product", "error");
                }
            } catch (error) {
                console.error("Error:", error);
                showMessage("productMessage", "Error adding product", "error");
            }
        });

        // Delete category
        async function deleteCategory(id) {
            if (!confirm("Are you sure?")) return;
            try {
                const response = await fetch(`${API_URL}/categories/${id}`, { method: "DELETE" });
                if (response.ok) {
                    showMessage("categoryMessage", "Category deleted!", "success");
                    loadCategories();
                }
            } catch (error) {
                console.error("Error:", error);
                showMessage("categoryMessage", "Error deleting category", "error");
            }
        }

        // Delete product
        async function deleteProduct(id) {
            if (!confirm("Are you sure?")) return;
            try {
                const response = await fetch(`${API_URL}/products/${id}`, { method: "DELETE" });
                if (response.ok) {
                    showMessage("productMessage", "Product deleted!", "success");
                    loadProducts();
                }
            } catch (error) {
                console.error("Error:", error);
                showMessage("productMessage", "Error deleting product", "error");
            }
        }

        // Show message
        function showMessage(elementId, message, type) {
            const msgEl = document.getElementById(elementId);
            msgEl.textContent = message;
            msgEl.className = `message ${type}`;
            setTimeout(() => {
                msgEl.className = "message";
            }, 3000);
        }

        // Initial load
        loadCategories();
        loadProducts();
        setInterval(loadProducts, 5000);
        setInterval(loadCategories, 5000);
    </script>
</body>
</html>
